document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ange: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"29a5d1d4-b6c3-4c92-b62a-499ff4a0e9bf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *{box-sizing:border-box;margin:0;padding:0}\n    body{background:#F8FAFC}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#F8FAFC;font-family:'Inter','IBM Plex Sans Thai',sans-serif;color:#0F172A;padding:56px 64px;max-width:1280px;margin:0 auto\">\n\n  <!-- Header -->\n  <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:8px\">\n    <div style=\"width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(99,102,241,.35)\">\n      <span style=\"color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:22px\">Q<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.02em\">Qchat<\u002Fspan>\n    <span style=\"margin-left:auto;font-size:13px;color:#64748B;font-family:'JetBrains Mono',monospace\">Design System v1.0<\u002Fspan>\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:40px;letter-spacing:-.03em;margin:18px 0 8px\">Design System<\u002Fh1>\n  <p style=\"font-size:16px;color:#64748B;max-width:560px;line-height:1.6\">ระบบดีไซน์สำหรับแพลตฟอร์มแชท + คอมเมิร์ซครบวงจร — โทนสี ตัวอักษร และคอมโพเนนต์ที่ใช้ทั่วทั้งผลิตภัณฑ์<\u002Fp>\n\n  <!-- COLORS -->\n  <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#94A3B8;margin:56px 0 20px\">Color Palette<\u002Fh2>\n\n  <div style=\"margin-bottom:14px;font-size:13px;font-weight:600;color:#64748B\">Brand<\u002Fdiv>\n  <sc-for list=\"{{ brand }}\" as=\"c\" hint-placeholder-count=\"2\">\n    <div style=\"display:inline-block;vertical-align:top;width:200px;margin:0 16px 16px 0\">\n      <div style=\"height:96px;border-radius:12px;background:{{ c.css }};box-shadow:0 1px 3px rgba(15,23,42,.08);border:1px solid rgba(15,23,42,.04)\"><\u002Fdiv>\n      <div style=\"margin-top:10px;font-size:13px;font-weight:600\">{{ c.name }}<\u002Fdiv>\n      <div style=\"font-size:12px;color:#94A3B8;font-family:'JetBrains Mono',monospace\">{{ c.hex }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <div style=\"margin:24px 0 14px;font-size:13px;font-weight:600;color:#64748B\">Semantic<\u002Fdiv>\n  <sc-for list=\"{{ semantic }}\" as=\"c\" hint-placeholder-count=\"3\">\n    <div style=\"display:inline-block;vertical-align:top;width:200px;margin:0 16px 16px 0\">\n      <div style=\"height:96px;border-radius:12px;background:{{ c.css }};box-shadow:0 1px 3px rgba(15,23,42,.08);border:1px solid rgba(15,23,42,.04)\"><\u002Fdiv>\n      <div style=\"margin-top:10px;font-size:13px;font-weight:600\">{{ c.name }}<\u002Fdiv>\n      <div style=\"font-size:12px;color:#94A3B8;font-family:'JetBrains Mono',monospace\">{{ c.hex }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <div style=\"margin:24px 0 14px;font-size:13px;font-weight:600;color:#64748B\">Neutrals<\u002Fdiv>\n  <sc-for list=\"{{ neutrals }}\" as=\"c\" hint-placeholder-count=\"5\">\n    <div style=\"display:inline-block;vertical-align:top;width:152px;margin:0 14px 16px 0\">\n      <div style=\"height:80px;border-radius:12px;background:{{ c.css }};box-shadow:0 1px 3px rgba(15,23,42,.06);border:1px solid #E2E8F0\"><\u002Fdiv>\n      <div style=\"margin-top:10px;font-size:13px;font-weight:600\">{{ c.name }}<\u002Fdiv>\n      <div style=\"font-size:12px;color:#94A3B8;font-family:'JetBrains Mono',monospace\">{{ c.hex }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- TYPOGRAPHY -->\n  <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#94A3B8;margin:56px 0 20px\">Typography<\u002Fh2>\n  <div style=\"background:#fff;border-radius:12px;border:1px solid #E2E8F0;box-shadow:0 1px 3px rgba(15,23,42,.04);padding:32px;margin-bottom:14px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:14px 0;border-bottom:1px solid #F1F5F9\">\n      <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:40px;letter-spacing:-.03em\">รวมทุกแชท Display<\u002Fdiv>\n      <div style=\"font-size:12px;color:#94A3B8;font-family:'JetBrains Mono',monospace;white-space:nowrap\">Jakarta 800 · 40<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:14px 0;border-bottom:1px solid #F1F5F9\">\n      <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:28px;letter-spacing:-.02em\">หัวข้อหลัก Heading<\u002Fdiv>\n      <div style=\"font-size:12px;color:#94A3B8;font-family:'JetBrains Mono',monospace;white-space:nowrap\">Jakarta 700 · 28<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:14px 0;border-bottom:1px solid #F1F5F9\">\n      <div style=\"font-weight:600;font-size:18px\">หัวข้อรอง Subheading<\u002Fdiv>\n      <div style=\"font-size:12px;color:#94A3B8;font-family:'JetBrains Mono',monospace;white-space:nowrap\">Inter 600 · 18<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:14px 0;border-bottom:1px solid #F1F5F9\">\n      <div style=\"font-size:15px;color:#334155\">เนื้อหาทั่วไป Body text สำหรับการอ่าน<\u002Fdiv>\n      <div style=\"font-size:12px;color:#94A3B8;font-family:'JetBrains Mono',monospace;white-space:nowrap\">Inter 400 · 15<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:14px 0\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-variant-numeric:tabular-nums\">฿24,580.00 · 1,204<\u002Fdiv>\n      <div style=\"font-size:12px;color:#94A3B8;font-family:'JetBrains Mono',monospace;white-space:nowrap\">Tabular nums<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- BUTTONS -->\n  <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#94A3B8;margin:56px 0 20px\">Buttons &amp; Badges<\u002Fh2>\n  <div style=\"background:#fff;border-radius:12px;border:1px solid #E2E8F0;box-shadow:0 1px 3px rgba(15,23,42,.04);padding:32px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-bottom:14px\">\n    <button style=\"border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:15px;padding:11px 22px;border-radius:8px;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.32)\">เริ่มใช้ฟรี<\u002Fbutton>\n    <button style=\"border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:15px;padding:11px 22px;border-radius:8px;background:#5B5BD6;color:#fff\">ปุ่มหลัก<\u002Fbutton>\n    <button style=\"cursor:pointer;font-family:inherit;font-weight:600;font-size:15px;padding:11px 22px;border-radius:8px;background:#fff;color:#334155;border:1px solid #E2E8F0\">ปุ่มรอง<\u002Fbutton>\n    <button style=\"cursor:pointer;font-family:inherit;font-weight:600;font-size:15px;padding:11px 22px;border-radius:8px;background:transparent;color:#5B5BD6;border:none\">ดูเดโม<\u002Fbutton>\n    <span style=\"display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:#ECFDF5;color:#059669;font-size:13px;font-weight:600\"><span style=\"width:7px;height:7px;border-radius:50%;background:#10B981\"><\u002Fspan>ชำระแล้ว<\u002Fspan>\n    <span style=\"display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:#FFFBEB;color:#D97706;font-size:13px;font-weight:600\"><span style=\"width:7px;height:7px;border-radius:50%;background:#F59E0B\"><\u002Fspan>กำลังนำส่ง<\u002Fspan>\n    <span style=\"display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:#FEF2F2;color:#DC2626;font-size:13px;font-weight:600\"><span style=\"width:7px;height:7px;border-radius:50%;background:#EF4444\"><\u002Fspan>หมดสต็อก<\u002Fspan>\n    <span style=\"display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:#EEF2FF;color:#5B5BD6;font-size:13px;font-weight:600\">แอดมิน<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- COMPONENTS -->\n  <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:#94A3B8;margin:56px 0 20px\">Components<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:60px\">\n\n    <!-- input -->\n    <div style=\"background:#fff;border-radius:12px;border:1px solid #E2E8F0;box-shadow:0 1px 3px rgba(15,23,42,.04);padding:24px\">\n      <div style=\"font-size:13px;font-weight:600;color:#64748B;margin-bottom:14px\">Input · 10px radius<\u002Fdiv>\n      <label style=\"font-size:13px;font-weight:600;color:#334155;display:block;margin-bottom:6px\">อีเมล<\u002Flabel>\n      <input value=\"shop@qchat.co\" style=\"width:100%;font-family:inherit;font-size:14px;padding:10px 12px;border-radius:10px;border:1px solid #E2E8F0;background:#fff;color:#0F172A;outline:none\">\n      <div style=\"height:12px\"><\u002Fdiv>\n      <label style=\"font-size:13px;font-weight:600;color:#334155;display:block;margin-bottom:6px\">ค้นหา<\u002Flabel>\n      <div style=\"display:flex;align-items:center;gap:8px;border:1px solid #E2E8F0;border-radius:10px;padding:10px 12px\">\n        <span style=\"color:#94A3B8;font-size:14px\">⌕<\u002Fspan>\n        <span style=\"color:#94A3B8;font-size:14px\">ค้นหาลูกค้า...<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- avatar w/ platform badge -->\n    <div style=\"background:#fff;border-radius:12px;border:1px solid #E2E8F0;box-shadow:0 1px 3px rgba(15,23,42,.04);padding:24px\">\n      <div style=\"font-size:13px;font-weight:600;color:#64748B;margin-bottom:16px\">Avatar + platform badge<\u002Fdiv>\n      <div style=\"display:flex;gap:18px\">\n        <div style=\"position:relative;width:48px;height:48px\">\n          <div style=\"width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#A5B4FC,#818CF8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px\">ส<\u002Fdiv>\n          <div style=\"position:absolute;right:-2px;bottom:-2px;width:20px;height:20px;border-radius:50%;background:#06C755;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:800\">L<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;width:48px;height:48px\">\n          <div style=\"width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#FBCFE8,#F472B6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px\">น<\u002Fdiv>\n          <div style=\"position:absolute;right:-2px;bottom:-2px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF);border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px\">◎<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;width:48px;height:48px\">\n          <div style=\"width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#93C5FD,#3B82F6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px\">ก<\u002Fdiv>\n          <div style=\"position:absolute;right:-2px;bottom:-2px;width:20px;height:20px;border-radius:50%;background:#1877F2;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800\">f<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- card / shadow -->\n    <div style=\"background:#fff;border-radius:12px;border:1px solid #E2E8F0;box-shadow:0 1px 3px rgba(15,23,42,.04);padding:24px\">\n      <div style=\"font-size:13px;font-weight:600;color:#64748B;margin-bottom:16px\">Elevation<\u002Fdiv>\n      <div style=\"height:48px;border-radius:10px;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.06);display:flex;align-items:center;padding:0 14px;font-size:13px;color:#64748B;margin-bottom:12px\">shadow-sm<\u002Fdiv>\n      <div style=\"height:48px;border-radius:10px;background:#fff;box-shadow:0 4px 12px rgba(15,23,42,.08);display:flex;align-items:center;padding:0 14px;font-size:13px;color:#64748B;margin-bottom:12px\">shadow-md<\u002Fdiv>\n      <div style=\"height:48px;border-radius:10px;background:#fff;box-shadow:0 12px 28px rgba(15,23,42,.12);display:flex;align-items:center;padding:0 14px;font-size:13px;color:#64748B\">shadow-lg<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"text-align:center;color:#CBD5E1;font-size:13px;font-family:'JetBrains Mono',monospace;padding-bottom:24px\">Qchat · radius 12/10/8 · Plus Jakarta Sans + Inter + IBM Plex Sans Thai<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      brand: [\n        { name: 'Primary / Indigo', hex: '#5B5BD6', css: '#5B5BD6' },\n        { name: 'Brand Gradient', hex: '#6366F1 → #8B5CF6', css: 'linear-gradient(135deg,#6366F1,#8B5CF6)' },\n      ],\n
